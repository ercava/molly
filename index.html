    <!-- Scripts -->

    <script>
        function openModal(el) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImg');
            const modalVideo = document.getElementById('modalVideo');
            
            modal.style.display = 'flex';
            if (el.tagName === 'VIDEO') {
                modalImg.style.display = 'none';
                modalVideo.style.display = 'block';
                modalVideo.src = el.src;
                modalVideo.play();
            } else {
                modalVideo.style.display = 'none';
                modalImg.style.display = 'block';
                modalImg.src = el.src;
            }

            // Expose current element to app.js for commenting logic
            window.currentModalMedia = el.src.split('/').pop();
            const event = new CustomEvent('mediaOpened', { detail: window.currentModalMedia });
            window.dispatchEvent(event);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalVideo = document.getElementById('modalVideo');
            // Only close if clicking outside the wrapper or pressing close
            if(event && event.target.closest('.modal-wrapper') && !event.target.classList.contains('close')) return;
            
            modal.style.display = 'none';
            modalVideo.pause();
            
            window.dispatchEvent(new Event('mediaClosed'));
        }

        // Make modal background close the modal
        document.getElementById('modal').addEventListener('click', function(e) {
            if(e.target === this) {
                closeModal();
            }
        });
    </script>
